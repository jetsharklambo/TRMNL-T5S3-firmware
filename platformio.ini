; PlatformIO Project Configuration for TRMNL T5S3 Pro
; E-Paper Display with WiFi Image Download
;
; Platform: ESP32-S3 with LilyGo T5 4.7" E-Paper Display
; Framework: Arduino
;
; Features:
; - 4.7" EPD display (800x480 pixels)
; - WiFi connectivity
; - Image download from remote URLs
; - Deep sleep between updates

[platformio]
; Platform and board configuration
[env:T5_E_PAPER_S3_V7]
platform = espressif32@6.5.0
board = T5-ePaper-S3
framework = arduino

; Upload and monitor settings
upload_speed = 460800
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Custom partition table for larger SPIFFS
board_build.partitions = partitions.csv

; ============================================================================
; Include Paths
; ============================================================================
include_dir =
    include
    lib/trmnl/include

; ============================================================================
; Build Flags
; ============================================================================
build_flags =
    ; Hardware Configuration
    -DBOARD_HAS_PSRAM
    -DPSRAM_SPEED=120MHz

    ; USB Serial output (helpful for debugging)
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; Debug logging level (5 = verbose)
    -DCORE_DEBUG_LEVEL=5

    ; Disable compiler warnings for third-party libraries
    -DDISABLE_ALL_LIBRARY_WARNINGS

    ; Garbage collection for unused sections
    -Wl,--gc-sections

    ; Increase stack size for WiFi/HTTPS operations (24KB)
    -DARDUINO_LOOP_STACK_SIZE=24576

; ============================================================================
; Library Dependencies
; ============================================================================
lib_deps =
    ; Core ESP32 Libraries
    Wire
    SPI
    SPIFFS
    WiFi
    HTTPClient

    ; JSON parsing (for TRMNL API responses)
    bblanchon/ArduinoJson@6.21.3

    ; Image decoding
    bitbank2/PNGdec@1.1.6

    ; SD card support (Phase 6: Daily log export)
    SD

; ============================================================================
; Monitor and Debug Settings
; ============================================================================
; Note: monitor_filters and monitor_raw cannot be used together
; Uncomment to specify a custom monitor port
; monitor_port = /dev/ttyACM0

; ============================================================================
; Notes
; ============================================================================
;
; To customize WiFi settings, edit src/wifi_config.h:
; - WIFI_SSID: Your WiFi network name
; - WIFI_PASSWORD: Your WiFi password
; - TRMNL_TEST_IMAGE_URL: URL to test image
; - TRMNL_DEEP_SLEEP_SECONDS: Sleep interval between updates
;
; To build and upload:
;   pio run -t upload
;
; To monitor serial output:
;   pio device monitor
;
